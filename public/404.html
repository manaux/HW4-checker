<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HW4 Checker</title>
    <script>
      // GitHub Pages SPA fallback: redirect 404s to index.html preserving the path.
      // Based on https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1 // '/HW4-checker/' = 1 segment
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/' +
          '?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
