      <rect width="400" height="160" fill="white"/>
      <circle cx="95"  cy="115" r="17" fill="black"/>
      <circle cx="305" cy="115" r="17" fill="black"/>
    </mask>
  </defs>
  <!-- Body silhouette — masked to cut wheel arches -->
  <path mask="url(#wheels-s)" d="
    M 28 132 L 28 102
    Q 28 96 34 94
    L 62 94
    Q 74 60 100 48
    Q 132 36 178 34
    Q 222 32 258 37
    Q 294 42 316 56
    Q 332 66 336 82
    L 368 82
    Q 374 82 374 90
    L 374 132 Z
  "/>
  <!-- Front tyre ring -->
  <circle cx="95"  cy="115" r="20" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- Front hub -->
  <circle cx="95"  cy="115" r="8"  fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Rear tyre ring -->
  <circle cx="305" cy="115" r="20" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- Rear hub -->
  <circle cx="305" cy="115" r="8"  fill="none" stroke="currentColor" stroke-width="2.5"/>
